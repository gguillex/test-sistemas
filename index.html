<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulacro Examen — Sistemas Inteligentes</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Bricolage+Grotesque:wght@400;500;600;700;800&display=swap');

:root {
  --bg: #f5f2eb;
  --surface: #ffffff;
  --surface2: #f0ece2;
  --ink: #1a1712;
  --ink2: #4a4640;
  --muted: #9a9088;
  --border: #d8d0c4;
  --p1: #c84b2f;
  --p2: #2f7dc8;
  --t3: #00897b;
  --t4: #7b2cbf;
  --correct: #1a7a4a;
  --correct-bg: #e8f5ee;
  --wrong: #c83030;
  --wrong-bg: #fde8e8;
  --neutral-bg: #ede9e0;
  --gold: #c8921a;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Bricolage Grotesque', sans-serif;
  min-height: 100vh;
}

/* HEADER */
.header {
  background: var(--ink);
  color: var(--bg);
  padding: 2rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.header::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    45deg,
    transparent,
    transparent 20px,
    rgba(255,255,255,0.03) 20px,
    rgba(255,255,255,0.03) 21px
  );
}

.header h1 {
  font-size: clamp(1.6rem, 4vw, 2.8rem);
  font-weight: 800;
  letter-spacing: -0.02em;
  position: relative;
}

.header p {
  color: rgba(245,242,235,0.6);
  font-size: 0.9rem;
  margin-top: 0.4rem;
  font-family: 'IBM Plex Mono', monospace;
  position: relative;
}

/* SCOREBOARD */
#scoreboard {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 2rem;
  background: var(--ink);
  padding: 1rem 2rem 1.5rem;
  flex-wrap: wrap;
}

.score-item {
  text-align: center;
}

.score-num {
  font-size: 2rem;
  font-weight: 800;
  color: var(--bg);
  font-family: 'IBM Plex Mono', monospace;
  line-height: 1;
}

.score-num.correct { color: #5ddc8a; }
.score-num.wrong { color: #f07070; }
.score-num.pending { color: #f0c040; }

.score-label {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: rgba(245,242,235,0.5);
  font-family: 'IBM Plex Mono', monospace;
}

.progress-bar-wrap {
  width: 100%;
  max-width: 600px;
  height: 4px;
  background: rgba(255,255,255,0.1);
  border-radius: 2px;
  margin: 0 auto;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #5ddc8a, #40c0f0);
  border-radius: 2px;
  transition: width 0.4s ease;
  width: 0%;
}

/* FILTERS */
.filters {
  display: flex;
  gap: 0.5rem;
  padding: 1.25rem 1.5rem;
  flex-wrap: wrap;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  align-items: center;
}

.filter-label {
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  font-family: 'IBM Plex Mono', monospace;
  margin-right: 0.25rem;
}

.filter-btn {
  padding: 0.35rem 0.9rem;
  border-radius: 999px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--ink2);
  font-size: 0.8rem;
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}

.filter-btn:hover { border-color: var(--ink); color: var(--ink); }
.filter-btn.active-all { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.filter-btn.active-p1 { background: var(--p1); color: white; border-color: var(--p1); }
.filter-btn.active-p2 { background: var(--p2); color: white; border-color: var(--p2); }
.filter-btn.active-t3 { background: var(--t3); color: white; border-color: var(--t3); }
.filter-btn.active-t4 { background: var(--t4); color: white; border-color: var(--t4); }

.btn-reveal {
  margin-left: auto;
  padding: 0.35rem 1rem;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--ink2);
  font-size: 0.8rem;
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-reveal:hover { background: var(--correct-bg); border-color: var(--correct); color: var(--correct); }

.btn-shuffle {
  padding: 0.35rem 1rem;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--ink2);
  font-size: 0.8rem;
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-shuffle:hover { background: #e3eefe; border-color: var(--p2); color: var(--p2); }

.btn-reset {
  padding: 0.35rem 1rem;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--ink2);
  font-size: 0.8rem;
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-reset:hover { background: var(--wrong-bg); border-color: var(--wrong); color: var(--wrong); }

/* QUIZ CONTAINER */
.quiz-container {
  max-width: 860px;
  margin: 0 auto;
  padding: 1.5rem 1rem 4rem;
}

/* QUESTION CARD */
.q-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  margin-bottom: 1.25rem;
  overflow: hidden;
  transition: border-color 0.2s;
}

.q-card.answered-correct { border-color: var(--correct); }
.q-card.answered-wrong { border-color: var(--wrong); }

.q-header {
  display: flex;
  align-items: flex-start;
  gap: 0.75rem;
  padding: 1.25rem 1.5rem 1rem;
}

.q-num {
  background: var(--neutral-bg);
  color: var(--muted);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.72rem;
  font-weight: 600;
  padding: 0.2rem 0.55rem;
  border-radius: 6px;
  white-space: nowrap;
  margin-top: 0.15rem;
  flex-shrink: 0;
}

.q-tag {
  font-size: 0.65rem;
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 600;
  padding: 0.2rem 0.55rem;
  border-radius: 6px;
  white-space: nowrap;
  margin-top: 0.15rem;
  flex-shrink: 0;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.q-tag.p1 { background: #fde8e3; color: var(--p1); }
.q-tag.p2 { background: #e3eefe; color: var(--p2); }
.q-tag.t3 { background: #e0f2f1; color: var(--t3); }
.q-tag.t4 { background: #f3e6ff; color: var(--t4); }

.q-text {
  font-size: 1rem;
  font-weight: 600;
  line-height: 1.5;
  color: var(--ink);
}

.q-options {
  padding: 0 1.5rem 1.25rem;
  display: grid;
  gap: 0.45rem;
}

.opt-btn {
  display: flex;
  align-items: flex-start;
  gap: 0.75rem;
  padding: 0.7rem 1rem;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: var(--bg);
  cursor: pointer;
  text-align: left;
  transition: all 0.15s;
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 0.9rem;
  color: var(--ink);
  width: 100%;
}

.opt-btn:hover:not(:disabled) {
  border-color: var(--ink);
  background: var(--surface2);
}

.opt-btn:disabled { cursor: default; }

.opt-letter {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.75rem;
  font-weight: 600;
  background: var(--surface2);
  color: var(--muted);
  width: 22px;
  height: 22px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 0.05rem;
  transition: all 0.15s;
}

.opt-btn.correct-ans {
  background: var(--correct-bg);
  border-color: var(--correct);
  color: var(--correct);
}

.opt-btn.correct-ans .opt-letter {
  background: var(--correct);
  color: white;
}

.opt-btn.wrong-ans {
  background: var(--wrong-bg);
  border-color: var(--wrong);
  color: var(--wrong);
}

.opt-btn.wrong-ans .opt-letter {
  background: var(--wrong);
  color: white;
}

.opt-btn.reveal-correct {
  background: var(--correct-bg);
  border-color: var(--correct);
  color: var(--correct);
  opacity: 0.7;
}

.opt-btn.reveal-correct .opt-letter {
  background: var(--correct);
  color: white;
}

/* EXPLANATION */
.explanation {
  margin: 0 1.5rem 1.25rem;
  padding: 0.85rem 1rem;
  border-radius: 10px;
  font-size: 0.88rem;
  line-height: 1.6;
  display: none;
}

.explanation.show { display: block; }
.explanation.correct { background: var(--correct-bg); color: #0f5a34; border-left: 3px solid var(--correct); }
.explanation.wrong { background: var(--wrong-bg); color: #8a1010; border-left: 3px solid var(--wrong); }

.explanation strong { font-weight: 700; }

code {
  font-family: 'IBM Plex Mono', monospace;
  background: rgba(0,0,0,0.08);
  padding: 0.1em 0.35em;
  border-radius: 4px;
  font-size: 0.85em;
}

/* SECTION DIVIDER */
.section-div {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin: 2rem 0 1rem;
}

.section-div-line { flex: 1; height: 1px; background: var(--border); }

.section-div-label {
  font-size: 0.7rem;
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  padding: 0.3rem 0.9rem;
  border-radius: 999px;
  white-space: nowrap;
}

.section-div-label.p1 { background: #fde8e3; color: var(--p1); }
.section-div-label.p2 { background: #e3eefe; color: var(--p2); }
.section-div-label.t3 { background: #e0f2f1; color: var(--t3); }
.section-div-label.t4 { background: #f3e6ff; color: var(--t4); }

/* FINAL RESULT */
#final-result {
  display: none;
  background: var(--ink);
  color: var(--bg);
  border-radius: 20px;
  padding: 2.5rem;
  text-align: center;
  margin: 2rem 0;
}

#final-result h2 { font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem; }
#final-result .grade { font-size: 4rem; font-weight: 800; font-family: 'IBM Plex Mono', monospace; margin: 1rem 0; }
#final-result p { color: rgba(245,242,235,0.7); font-size: 0.9rem; }

.btn-retry {
  margin-top: 1.5rem;
  padding: 0.75rem 2rem;
  background: var(--bg);
  color: var(--ink);
  border: none;
  border-radius: 10px;
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.2s;
}

.btn-retry:hover { opacity: 0.85; }

/* HIDDEN */
.hidden { display: none !important; }

@media (max-width: 600px) {
  .q-header { padding: 1rem; }
  .q-options { padding: 0 1rem 1rem; }
  .explanation { margin: 0 1rem 1rem; }
}
</style>
</head>
<body>

<div class="header">
  <h1>🎯 Simulacro de Examen</h1>
  <p>Sistemas Inteligentes · UCAM · Prácticas 1 y 2</p>
</div>

<div id="scoreboard">
  <div class="score-item">
    <div class="score-num" id="s-total">0</div>
    <div class="score-label">Respondidas</div>
  </div>
  <div class="score-item">
    <div class="score-num correct" id="s-correct">0</div>
    <div class="score-label">Correctas</div>
  </div>
  <div class="score-item">
    <div class="score-num wrong" id="s-wrong">0</div>
    <div class="score-label">Errores</div>
  </div>
  <div class="score-item">
    <div class="score-num pending" id="s-pct">0%</div>
    <div class="score-label">Acierto</div>
  </div>
  <div style="width:100%; max-width:600px;">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
  </div>
</div>

<div class="filters">
  <span class="filter-label">Filtrar:</span>
  <button class="filter-btn active-all" onclick="filterQuestions('all', this)">Todas</button>
  <button class="filter-btn" onclick="filterQuestions('p1', this)">Práctica 1</button>
  <button class="filter-btn" onclick="filterQuestions('p2', this)">Práctica 2</button>
  <button class="filter-btn" onclick="filterQuestions('t3', this)">Tema 3</button>
  <button class="filter-btn" onclick="filterQuestions('t4', this)">Tema 4</button>
  <button class="btn-reveal" onclick="revealAll()">👁️ Mostrar soluciones</button>
  <button class="btn-shuffle" onclick="shuffleAndReset()">🔀 Mezclar</button>
  <button class="btn-reset" onclick="resetAll()">↺ Reiniciar todo</button>
</div>

<div class="quiz-container" id="quiz-container">
  </div>

<script>
const questions = [
  // ============ PRÁCTICA 1 ============
  {
    tag: 'p1',
    section: 'Práctica 1 — Machine Learning con Python (sklearn)',
    text: '¿Qué librería de Python se usa en la Práctica 1 para Machine Learning?',
    opts: ['TensorFlow', 'scikit-learn', 'PyTorch', 'Keras'],
    correct: 1,
    exp: '<strong>scikit-learn (sklearn)</strong> es la librería usada en la Práctica 1. TensorFlow y Keras se usan en la Práctica 2 para Deep Learning.'
  },
  {
    tag: 'p1',
    text: '¿Cuántas muestras tiene el dataset Iris en total?',
    opts: ['100', '120', '150', '200'],
    correct: 2,
    exp: 'Iris contiene <strong>150 muestras</strong>, distribuidas en 50 muestras por cada una de las 3 clases (Setosa, Versicolor, Virgínica).'
  },
  {
    tag: 'p1',
    text: '¿Cuántas características de entrada tiene el dataset Iris?',
    opts: ['2', '3', '4', '5'],
    correct: 2,
    exp: 'Iris tiene <strong>4 características</strong>: longitud del sépalo, ancho del sépalo, longitud del pétalo y ancho del pétalo.'
  },
  {
    tag: 'p1',
    text: '¿Cuántas muestras tiene el dataset Breast Cancer Wisconsin?',
    opts: ['150', '350', '569', '750'],
    correct: 2,
    exp: 'Breast Cancer Wisconsin tiene <strong>569 muestras</strong>: 212 malignas y 357 benignas.'
  },
  {
    tag: 'p1',
    text: '¿Cuántas características tiene el dataset Breast Cancer Wisconsin?',
    opts: ['4', '10', '20', '30'],
    correct: 3,
    exp: 'Breast Cancer Wisconsin tiene <strong>30 características</strong> de entrada, todas representadas por números reales positivos.'
  },
  {
    tag: 'p1',
    text: '¿Cuántas muestras malignas tiene el dataset Breast Cancer?',
    opts: ['100', '212', '357', '450'],
    correct: 1,
    exp: 'El dataset tiene <strong>212 muestras malignas</strong> y 357 benignas, sumando 569 en total.'
  },
  {
    tag: 'p1',
    text: '¿Cómo se carga el dataset Iris desde sklearn?',
    opts: ['datasets.iris()', 'datasets.load_iris()', 'datasets.get_iris()', 'load_dataset("iris")'],
    correct: 1,
    exp: 'La función correcta es <code>datasets.load_iris()</code>. El patrón general en sklearn es <code>datasets.load_NOMBRE()</code>.'
  },
  {
    tag: 'p1',
    text: '¿Cómo se carga el dataset Breast Cancer desde sklearn?',
    opts: ['datasets.load_cancer()', 'datasets.breast_cancer()', 'datasets.load_breast_cancer()', 'load_dataset("cancer")'],
    correct: 2,
    exp: 'La función correcta es <code>datasets.load_breast_cancer()</code>.'
  },
  {
    tag: 'p1',
    text: 'Para dividir los datos en entrenamiento y test, ¿qué función se usa?',
    opts: ['model_selection.split_data()', 'model_selection.train_test_split()', 'preprocessing.split()', 'datasets.divide()'],
    correct: 1,
    exp: '<code>model_selection.train_test_split(x, t, test_size=0.30, random_state=7)</code> es la función estándar para dividir datos en sklearn.'
  },
  {
    tag: 'p1',
    text: 'Con Iris (150 muestras) y test_size=0.30, ¿cuántas muestras van a test?',
    opts: ['30', '40', '45', '50'],
    correct: 2,
    exp: '30% de 150 = <strong>45 muestras</strong> para test. Las 105 restantes van a entrenamiento.'
  },
  {
    tag: 'p1',
    text: '¿Qué significa la variable "xe" en el split de sklearn?',
    opts: ['Etiquetas de entrenamiento', 'Muestras de test', 'Muestras de entrenamiento (features)', 'Porcentaje de error'],
    correct: 2,
    exp: '<strong>xe</strong> = muestras de entrenamiento (features). <strong>xt</strong> = muestras de test. <strong>te</strong> = etiquetas entrenamiento. <strong>tt</strong> = etiquetas test.'
  },
  {
    tag: 'p1',
    text: 'Una vez instanciado el clasificador, la función fit(....) se define correctamente como:',
    opts: ['fit(xe,te)', 'fit(xe)', 'fit(xe, te, xt, tt)', 'fit(te,tt)'],
    correct: 0,
    exp: '<code>fit(xe, te)</code>: primero recibe las <strong>muestras de entrenamiento</strong> (xe) y luego sus <strong>etiquetas</strong> (te). Nunca se pasan datos de test.'
  },
  {
    tag: 'p1',
    text: '¿Con qué datos se llama al método predict() para evaluar el modelo?',
    opts: ['predict(xe)', 'predict(te)', 'predict(xt)', 'predict(tt)'],
    correct: 2,
    exp: '<code>predict(xt)</code>: se predice sobre las <strong>muestras de test</strong> (xt). Los datos de test no deben usarse en el entrenamiento.'
  },
  {
    tag: 'p1',
    text: 'Para calcular el porcentaje de acierto del clasificador comparando las etiquetas reales del test (tt) con las predicciones (obtenido), la función utilizada es:',
    opts: ['confusion_matrix(tt, obtenido)', 'score(tt, obtenido)', 'calculate_accuracy(tt, obtenido)', 'accuracy_score(tt, obtenido)'],
    correct: 3,
    exp: '<code>accuracy_score(tt, obtenido)</code> de <code>sklearn.metrics</code> es la encargada de calcular ese porcentaje cruzando valores reales y predictivos.'
  },
  {
    tag: 'p1',
    text: 'Para normalizar los datos de entrada (x) de la base de datos breast_cancer utilizando la librería de preprocesamiento de sklearn, ¿qué instrucción se utiliza?',
    opts: ['x_norm = preprocessing.normalize(x)', 'x_norm = preprocessing.scale(x)', 'x_norm = preprocessing.standardize(x)', 'x_norm = preprocessing.minmax_scale(x)'],
    correct: 1,
    exp: '<code>preprocessing.scale(x)</code> es la función requerida en la práctica para estandarizar los datos (media 0, desviación 1).'
  },
  {
    tag: 'p1',
    text: '¿Cuál es el valor por defecto del parámetro k en KNeighborsClassifier?',
    opts: ['3', '5', '7', '10'],
    correct: 1,
    exp: 'KNeighborsClassifier usa <strong>k=5</strong> por defecto. Se puede modificar: <code>KNeighborsClassifier(3)</code> usa k=3.'
  },
  {
    tag: 'p1',
    text: '¿Cómo se importa el clasificador KNN en sklearn?',
    opts: ['from sklearn.knn import KNeighborsClassifier', 'from sklearn.neighbors import KNeighborsClassifier', 'from sklearn.classifiers import KNN', 'from sklearn.ml import KNeighborsClassifier'],
    correct: 1,
    exp: '<code>from sklearn.neighbors import KNeighborsClassifier</code> es el import correcto.'
  },
  {
    tag: 'p1',
    text: '¿Cómo se importa el árbol de decisión en sklearn?',
    opts: ['from sklearn.decision import DecisionTree', 'from sklearn.trees import TreeClassifier', 'from sklearn.tree import DecisionTreeClassifier', 'from sklearn.classifiers import DecisionTreeClassifier'],
    correct: 2,
    exp: '<code>from sklearn.tree import DecisionTreeClassifier</code> es el import correcto.'
  },
  {
    tag: 'p1',
    text: '¿Cómo se importa la SVM en sklearn?',
    opts: ['from sklearn.svm import SVC', 'from sklearn.support import SVM', 'from sklearn.vector import SVMClassifier', 'from sklearn.svm import SVMClassifier'],
    correct: 0,
    exp: '<code>from sklearn.svm import SVC</code> (Support Vector Classifier) es el import correcto.'
  },
  {
    tag: 'p1',
    text: '¿Cómo se importa la red neuronal MLP en sklearn?',
    opts: ['from sklearn.deep import MLPClassifier', 'from sklearn.nn import NeuralNetwork', 'from sklearn.neural_network import MLPClassifier', 'from sklearn.network import MLPClassifier'],
    correct: 2,
    exp: '<code>from sklearn.neural_network import MLPClassifier</code> es el import correcto.'
  },
  {
    tag: 'p1',
    text: '¿Cómo se importa el clasificador Bayesiano en sklearn?',
    opts: ['from sklearn.bayes import GaussianClassifier', 'from sklearn.gaussian_process import GaussianProcessClassifier', 'from sklearn.naive_bayes import GaussianProcessClassifier', 'from sklearn.probabilistic import BayesClassifier'],
    correct: 1,
    exp: '<code>from sklearn.gaussian_process import GaussianProcessClassifier</code> es el import correcto.'
  },
  {
    tag: 'p1',
    text: '¿Qué clasificadores producen resultados diferentes en cada ejecución por tener inicialización aleatoria?',
    opts: ['KNN y árbol de decisión', 'SVM y KNN', 'MLPClassifier y GaussianProcessClassifier', 'Árbol de decisión y SVM'],
    correct: 2,
    exp: '<strong>MLPClassifier y GaussianProcessClassifier</strong> tienen inicialización aleatoria de pesos, por lo que sus resultados varían. Para ellos hay que hacer 10 simulaciones y calcular media y desviación típica.'
  },
  {

// State
let answered = new Set();
let correctCount = 0;
let wrongCount = 0;
let currentFilter = 'all';

function buildQuiz(filter) {
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';

  let filtered = questions.filter(q => filter === 'all' || q.tag === filter);
  let lastSection = '';
  let num = 0;

  filtered.forEach((q, idx) => {
    num++;
    const globalIdx = questions.indexOf(q);

    // Section divider
    if (!isShuffled && q.section && q.section !== lastSection) {
      lastSection = q.section;
      const tag = q.tag;
      const div = document.createElement('div');
      div.className = 'section-div';
      div.innerHTML = `<div class="section-div-line"></div><span class="section-div-label ${tag}">${q.section}</span><div class="section-div-line"></div>`;
      container.appendChild(div);
    }

    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = `card-${globalIdx}`;

    if (answeredMap[globalIdx] !== undefined) {
      const isCorrect = answeredMap[globalIdx] === q.correct;
      card.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');
    }

    const optsHTML = q.opts.map((o, i) => {
      const letters = ['a', 'b', 'c', 'd'];
      let cls = 'opt-btn';
      if (answeredMap[globalIdx] !== undefined) {
        if (i === q.correct) cls += ' correct-ans';
        else if (i === answeredMap[globalIdx] && answeredMap[globalIdx] !== q.correct) cls += ' wrong-ans';
        else cls += ' dimmed';
      }
      return `<button class="${cls}" onclick="answer(${globalIdx}, ${i})" ${answeredMap[globalIdx] !== undefined ? 'disabled' : ''}>
        <span class="opt-letter">${letters[i]}</span>
        <span>${o}</span>
      </button>`;
    }).join('');

    let expClass = '';
    let expShow = '';
    if (answeredMap[globalIdx] !== undefined) {
      const correct = answeredMap[globalIdx] === q.correct;
      expClass = correct ? 'correct' : 'wrong';
      expShow = 'show';
    }

    card.innerHTML = `
      <div class="q-header">
        <span class="q-num">#${num}</span>
        <span class="q-tag ${q.tag}">${q.tag === 'p1' ? 'Práctica 1' : q.tag === 'p2' ? 'Práctica 2' : q.tag === 't3' ? 'Tema 3' : 'Tema 4'}</span>
        <span class="q-text">${q.text}</span>
      </div>
      <div class="q-options">${optsHTML}</div>
      <div class="explanation ${expClass} ${expShow}" id="exp-${globalIdx}">
        ${answeredMap[globalIdx] !== undefined ? (answeredMap[globalIdx] === q.correct ? '✅ Correcto. ' : '❌ Incorrecto. ') + q.exp : q.exp}
      </div>
    `;

    container.appendChild(card);
  });

  updateScore(filter);
}

const answeredMap = {};

function answer(qIdx, optIdx) {
  if (answeredMap[qIdx] !== undefined) return;
  answeredMap[qIdx] = optIdx;

  const q = questions[qIdx];
  const card = document.getElementById(`card-${qIdx}`);
  const buttons = card.querySelectorAll('.opt-btn');
  const exp = document.getElementById(`exp-${qIdx}`);

  const isCorrect = optIdx === q.correct;

  buttons.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.correct) {
      btn.classList.add('correct-ans');
      btn.querySelector('.opt-letter').style.background = 'var(--correct)';
      btn.querySelector('.opt-letter').style.color = 'white';
    } else if (i === optIdx && !isCorrect) {
      btn.classList.add('wrong-ans');
      btn.querySelector('.opt-letter').style.background = 'var(--wrong)';
      btn.querySelector('.opt-letter').style.color = 'white';
    }
  });

  if (isCorrect) {
    card.classList.add('answered-correct');
    exp.className = 'explanation correct show';
    exp.innerHTML = '✅ Correcto. ' + q.exp;
    correctCount++;
  } else {
    card.classList.add('answered-wrong');
    exp.className = 'explanation wrong show';
    exp.innerHTML = '❌ Incorrecto. ' + q.exp;
    wrongCount++;
  }

  updateScore(currentFilter);

  // Scroll to next
  setTimeout(() => {
    const allCards = document.querySelectorAll('.q-card:not(.answered-correct):not(.answered-wrong)');
    if (allCards.length > 0) {
      allCards[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }, 600);
}

function updateScore(filter) {
  const filtered = questions.filter(q => filter === 'all' || q.tag === filter);
  const total = filtered.length;
  const answeredCount = filtered.filter(q => answeredMap[questions.indexOf(q)] !== undefined).length;
  const correct = filtered.filter(q => answeredMap[questions.indexOf(q)] === q.correct).length;
  const wrong = answeredCount - correct;
  const pct = answeredCount > 0 ? Math.round((correct / answeredCount) * 100) : 0;

  document.getElementById('s-total').textContent = answeredCount;
  document.getElementById('s-correct').textContent = correct;
  document.getElementById('s-wrong').textContent = wrong;
  document.getElementById('s-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = (answeredCount / total * 100) + '%';

  if (answeredCount === total && total > 0) {
    showFinalResult(correct, total);
  }
}

function showFinalResult(correct, total) {
  const pct = Math.round((correct / total) * 100);
  let grade, emoji;
  if (pct >= 90) { grade = '10 🏆'; emoji = '¡Sobresaliente! Estás listo para el examen.'; }
  else if (pct >= 80) { grade = '8-9 🎉'; emoji = 'Notable. Repasa los errores y estarás perfecto.'; }
  else if (pct >= 70) { grade = '7 📚'; emoji = 'Bien, pero hay que repasar algunos conceptos.'; }
    else if (pct >= 60) { grade = '6 🔄'; emoji = 'Suficiente. Necesitas repasar bastante.'; }
  else { grade = '< 5 ⚠️'; emoji = 'Hay que estudiar más. ¡Tú puedes!'; }

  let existing = document.getElementById('final-result');
  if (!existing) {
    existing = document.createElement('div');
    existing.id = 'final-result';
    document.getElementById('quiz-container').appendChild(existing);
  }
  existing.style.display = 'block';
  existing.innerHTML = `
    <h2>¡Test completado!</h2>
    <div class="grade">${grade}</div>
    <p>${correct} de ${total} preguntas correctas (${pct}%)</p>
    <p style="margin-top:0.5rem">${emoji}</p>
    <button class="btn-retry" onclick="resetAll()">↺ Volver a intentarlo</button>
  `;
  existing.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function filterQuestions(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.className = 'filter-btn';
  });
  btn.classList.add(`active-${filter}`);
  buildQuiz(filter);
}

function resetAll() {
  if (Object.keys(answeredMap).length > 0) {
    if (!confirm('¿Seguro que quieres reiniciar todo el progreso y restablecer el orden?')) return;
  }
  
  isShuffled = false;
  questions.sort((a, b) => a._origIdx - b._origIdx);
  Object.keys(answeredMap).forEach(k => delete answeredMap[k]);
  correctCount = 0;
  wrongCount = 0;
  const fr = document.getElementById('final-result');
  if (fr) fr.style.display = 'none';
  buildQuiz(currentFilter);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function revealAll() {
  questions.forEach((q, idx) => {
    if (answeredMap[idx] === undefined) {
      answeredMap[idx] = q.correct;
    }
  });
  
  buildQuiz(currentFilter);
}

function shuffleAndReset() {
  if (Object.keys(answeredMap).length > 0) {
    if (!confirm('¿Seguro que quieres mezclar las preguntas? Esto reiniciará tu progreso actual.')) return;
  }
  
  isShuffled = true;
  for (let i = questions.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [questions[i], questions[j]] = [questions[j], questions[i]];
  }
  
  Object.keys(answeredMap).forEach(k => delete answeredMap[k]);
  correctCount = 0;
  wrongCount = 0;
  const fr = document.getElementById('final-result');
  if (fr) fr.style.display = 'none';
  
  buildQuiz(currentFilter);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Init
let isShuffled = false;
questions.forEach((q, i) => q._origIdx = i);
buildQuiz('all');
</script>
